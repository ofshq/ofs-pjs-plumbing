backend:
  name: git-gateway
  branch: main
media_folder: "assets/images/uploads"
public_folder: "/assets/images/uploads"
collections:
  - name: "projects"
    label: "Projects"
    folder: "content/projects"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - {label: "Project title", name: "title", widget: "string"}
      - {label: "Category", name: "category", widget: "select", options: ["Water Heaters", "Bathrooms", "Toilets", "Filtration", "Repairs"]}
      - {label: "Before photo", name: "before_image", widget: "image", required: false}
      - {label: "After photo", name: "after_image", widget: "image"}
      - {label: "Description", name: "body", widget: "markdown"}
