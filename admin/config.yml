backend:
  name: git-gateway
  branch: main

site_url: https://ofs-pjs-plumbing.netlify.app
display_url: https://ofs-pjs-plumbing.netlify.app
logo_url: /assets/images/pjs-plumbing-logo.jpeg

media_folder: assets/images/uploads
public_folder: /assets/images/uploads
publish_mode: simple

collections:
  - name: website
    label: Website
    files:
      - name: project_gallery
        label: Project Photos
        file: content/gallery.json
        format: json
        fields:
          - label: Projects
            name: projects
            widget: list
            summary: "{{fields.title}}"
            minimize_collapsed: true
            fields:
              - label: Project title
                name: title
                widget: string
              - label: Short description
                name: description
                widget: string
              - label: Photo
                name: image
                widget: image
                hint: Use a clear landscape photo. Keep uploads under 5 MB when possible.
              - label: Photo description for accessibility
                name: alt
                widget: string
                hint: Briefly describe what is shown in the photo.
